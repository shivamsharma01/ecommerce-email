server:
  port: ${SERVER_PORT:8089}

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /
      path-mapping:
        health: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

spring:
  application:
    name: email
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  cloud:
    gcp:
      project-id: ${SPRING_CLOUD_GCP_PROJECT_ID:}
      credentials:
        location: ${GCP_CREDENTIALS_PATH:}
      pubsub:
        enabled: ${SPRING_CLOUD_GCP_PUBSUB_ENABLED:false}
  mail:
    test-connection: false
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: ${SPRING_MAIL_SSL_TRUST:smtp.gmail.com}

email:
  pubsub:
    enabled: ${EMAIL_PUBSUB_ENABLED:false}
    subscription: ${EMAIL_PUBSUB_SUBSCRIPTION:email-verification-events-sub}
  verification:
    base-url: ${EMAIL_VERIFICATION_BASE_URL:http://localhost:8081}
  order:
    base-url: ${EMAIL_ORDER_BASE_URL:}
  order-paid:
    enabled: ${EMAIL_ORDER_PAID_ENABLED:false}
    subscription: ${EMAIL_ORDER_PAID_SUBSCRIPTION:order-paid-email-sub}
    # Idempotency keys under prefix mcart:email:order-paid:dedupe: (shared Redis; isolated by key namespace)
    dedupe-ttl-hours: ${EMAIL_ORDER_PAID_DEDUPE_TTL_HOURS:24}
